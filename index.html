<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>BTC Prediction</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

button{

padding:20px;
margin:10px;
font-size:18px;
border-radius:10px;
border:none;

}

.long{
background:#22c55e;
}

.short{
background:#ef4444;
}

</style>

</head>

<body>

<h1>🚀 BTC Prediction Arena</h1>

<div>
🪙 Coins: <span id="coins">...</span>
</div>

<div>
Preço BTC: $<span id="price">...</span>
</div>

<button class="long" onclick="bet('up')">
📈 LONG
</button>

<button class="short" onclick="bet('down')">
📉 SHORT
</button>

<div id="result"></div>

<h3>🏆 Ranking</h3>
<div id="ranking"></div>

<script>

let tg = window.Telegram.WebApp
let user = tg.initDataUnsafe.user

async function login(){

let r = await fetch("http://localhost:5000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user:user.id,
name:user.first_name

})

})

let data = await r.json()

document.getElementById("coins").innerText = data.coins

}

async function loadPrice(){

let r = await fetch(
"https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT"
)

let data = await r.json()

document.getElementById("price").innerText = data.price

return parseFloat(data.price)

}

async function bet(direction){

let start = await loadPrice()

setTimeout(async ()=>{

let end = await loadPrice()

let win = false

if(direction=="up" && end>start) win=true
if(direction=="down" && end<start) win=true

let r = await fetch("http://localhost:5000/bet",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user:user.id,
win:win

})

})

let data = await r.json()

document.getElementById("coins").innerText = data.coins

if(win){

document.getElementById("result").innerText="🎉 Você ganhou"

}else{

document.getElementById("result").innerText="❌ Você perdeu"

}

loadRanking()

},30000)

}

async function loadRanking(){

let r = await fetch("http://localhost:5000/ranking")

let data = await r.json()

let html=""

data.forEach((p,i)=>{

html += (i+1)+"️⃣ "+p[0]+" — "+p[1]+" coins<br>"

})

document.getElementById("ranking").innerHTML=html

}

login()
loadPrice()
loadRanking()

</script>

</body>

</html>
